<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — Uzair Nasir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">Uzair Nasir <span>shotbyuzair_</span></a>
        <nav class="primary-nav" aria-label="Primary navigation">
          <a href="index.html#work">Work</a>
          <a href="index.html#about">About</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <p class="eyebrow">Full Gallery</p>
        <h1>An expanding archive of light, space, and atmosphere.</h1>
        <p class="supporting-line">
          This page is intentionally designed to scale as new portrait, car, travel, and architectural work is added.
        </p>
        <div class="gallery-grid" id="gallery-grid"></div>
      </div>
    </main>

    <dialog id="lightbox" class="lightbox" aria-label="Expanded photo view">
      <button class="lightbox-close" type="button" aria-label="Close image">×</button>
      <img id="lightbox-image" alt="Expanded gallery photo" />
      <p id="lightbox-caption"></p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
